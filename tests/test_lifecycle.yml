---
# Integration tests for lifecycle policies, autostart, and VM management.
# Run: ansible-playbook -i inventory.local.ini tests/test_lifecycle.yml
#
# Uses a lightweight Ubuntu image for fast boot. Creates and destroys
# a test VM — does NOT touch existing VMs.

- name: "Test: Lifecycle policies"
  hosts: xen_hosts
  become: true
  vars:
    test_vm_name: xliac-test-lifecycle
    test_vm:
      name: "{{ test_vm_name }}"
      image: ubuntu-24.04
      memory: 512
      vcpus: 1
      disk_size: 4G
      bridge: xenbr0
      state: present
      autostart: false
      on_poweroff: destroy
      on_reboot: restart
      on_crash: preserve

  tasks:
    # --- Setup ---
    - name: "Cleanup: destroy leftover test VM"
      ansible.builtin.command:
        cmd: "xl destroy {{ test_vm_name }}"
      failed_when: false
      changed_when: false

    - name: "Cleanup: remove leftover test files"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/vm/{{ test_vm_name }}"
        - "/etc/xen/{{ test_vm_name }}.cfg"
        - "/etc/xen/auto/{{ test_vm_name }}.cfg"

    # === Test 1: Create VM with lifecycle policies ===
    - name: "Test 1: Create VM"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm, recursive=true) }}"

    - name: "Test 1: Verify domain is running"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t1_domid
      changed_when: false

    - name: "Test 1: Assert domain exists"
      ansible.builtin.assert:
        that: _t1_domid.rc == 0
        fail_msg: "Domain {{ test_vm_name }} is not running"

    - name: "Test 1: Read generated xl config"
      ansible.builtin.slurp:
        src: "/etc/xen/{{ test_vm_name }}.cfg"
      register: _t1_cfg

    - name: "Test 1: Assert lifecycle policies in config"
      ansible.builtin.assert:
        that:
          - "'on_poweroff = \"destroy\"' in _t1_cfg_content"
          - "'on_reboot = \"restart\"' in _t1_cfg_content"
          - "'on_crash = \"preserve\"' in _t1_cfg_content"
        fail_msg: "Lifecycle policies not rendered correctly in xl config"
      vars:
        _t1_cfg_content: "{{ _t1_cfg.content | b64decode }}"

    - name: "Test 1: Assert autostart symlink does NOT exist"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t1_autostart

    - name: "Test 1: Assert no autostart"
      ansible.builtin.assert:
        that: not _t1_autostart.stat.exists
        fail_msg: "Autostart symlink should not exist when autostart=false"

    - name: "Test 1: PASSED"
      ansible.builtin.debug:
        msg: "VM created with correct lifecycle policies, no autostart"

    # === Test 2: Enable autostart ===
    - name: "Test 2: Re-apply with autostart=true"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'autostart': true}), recursive=true) }}"

    - name: "Test 2: Check autostart symlink"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t2_autostart

    - name: "Test 2: Assert autostart symlink exists"
      ansible.builtin.assert:
        that:
          - _t2_autostart.stat.exists
          - _t2_autostart.stat.islnk
        fail_msg: "Autostart symlink should exist when autostart=true"

    - name: "Test 2: Assert symlink target"
      ansible.builtin.assert:
        that: _t2_autostart.stat.lnk_source == "/etc/xen/" + test_vm_name + ".cfg"
        fail_msg: "Autostart symlink points to wrong target"

    - name: "Test 2: PASSED"
      ansible.builtin.debug:
        msg: "Autostart symlink created correctly"

    # === Test 3: Idempotency — re-run should not change running VM ===
    - name: "Test 3: Get domain ID before re-apply"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t3_domid_before
      changed_when: false

    - name: "Test 3: Re-apply same config"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'autostart': true}), recursive=true) }}"

    - name: "Test 3: Get domain ID after re-apply"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t3_domid_after
      changed_when: false

    - name: "Test 3: Assert domain ID unchanged (not recreated)"
      ansible.builtin.assert:
        that: _t3_domid_before.stdout == _t3_domid_after.stdout
        fail_msg: "Domain was recreated on re-apply (not idempotent)"

    - name: "Test 3: PASSED"
      ansible.builtin.debug:
        msg: "Idempotent — domain not recreated on re-apply"

    # === Test 4: state=absent stops domain, removes autostart ===
    - name: "Test 4: Set state=absent"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'state': 'absent', 'autostart': true}), recursive=true) }}"

    - name: "Test 4: Check domain is stopped"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t4_domid
      failed_when: false
      changed_when: false

    - name: "Test 4: Assert domain is gone"
      ansible.builtin.assert:
        that: _t4_domid.rc != 0
        fail_msg: "Domain should not be running after state=absent"

    - name: "Test 4: Check autostart removed"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t4_autostart

    - name: "Test 4: Assert autostart removed"
      ansible.builtin.assert:
        that: not _t4_autostart.stat.exists
        fail_msg: "Autostart symlink should be removed on state=absent"

    - name: "Test 4: Assert disk still exists (absent keeps disk)"
      ansible.builtin.stat:
        path: "/vm/{{ test_vm_name }}/disk.qcow2"
      register: _t4_disk

    - name: "Test 4: Assert disk preserved"
      ansible.builtin.assert:
        that: _t4_disk.stat.exists
        fail_msg: "Disk should be preserved after state=absent"

    - name: "Test 4: PASSED"
      ansible.builtin.debug:
        msg: "state=absent stopped domain, removed autostart, preserved disk"

    # === Test 5: Verify disk, cloud-init ISO, and config structure ===
    - name: "Test 5: Check VM directory structure"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _t5_files
      loop:
        - "/vm/{{ test_vm_name }}/disk.qcow2"
        - "/vm/{{ test_vm_name }}/cloudinit.iso"
        - "/etc/xen/{{ test_vm_name }}.cfg"

    - name: "Test 5: Assert all files exist"
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Missing: {{ item.item }}"
      loop: "{{ _t5_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Test 5: Verify disk is a qcow2 overlay"
      ansible.builtin.command:
        cmd: "qemu-img info /vm/{{ test_vm_name }}/disk.qcow2"
      register: _t5_qemu
      changed_when: false

    - name: "Test 5: Assert backing file"
      ansible.builtin.assert:
        that: "'backing file' in _t5_qemu.stdout"
        fail_msg: "Disk is not a COW overlay"

    - name: "Test 5: PASSED"
      ansible.builtin.debug:
        msg: "Directory structure and disk overlay verified"

    # === Cleanup ===
    - name: "Cleanup: destroy test domain"
      ansible.builtin.command:
        cmd: "xl destroy {{ test_vm_name }}"
      failed_when: false
      changed_when: false

    - name: "Cleanup: remove test files"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/vm/{{ test_vm_name }}"
        - "/etc/xen/{{ test_vm_name }}.cfg"
        - "/etc/xen/auto/{{ test_vm_name }}.cfg"

    - name: "ALL TESTS PASSED"
      ansible.builtin.debug:
        msg: "5/5 tests passed — lifecycle policies, autostart, idempotency, absent state, file structure"
