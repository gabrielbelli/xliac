---
# Integration tests for lifecycle policies, autostart, and VM management.
# Run: ansible-playbook -i inventory.local.ini tests/test_lifecycle.yml
#
# Uses a lightweight Ubuntu image for fast boot. Creates and destroys
# a test VM — does NOT touch existing VMs.

- name: "Test: Lifecycle policies"
  hosts: xen_hosts
  become: true
  vars:
    test_vm_name: xliac-test-lifecycle
    test_vm:
      name: "{{ test_vm_name }}"
      image: ubuntu-24.04
      memory: 512
      vcpus: 1
      disk_size: 4G
      bridge: xenbr0
      state: present
      autostart: false
      on_poweroff: destroy
      on_reboot: restart
      on_crash: preserve

  tasks:
    # --- Setup ---
    - name: "Cleanup: destroy leftover test VM"
      ansible.builtin.command:
        cmd: "xl destroy {{ test_vm_name }}"
      failed_when: false
      changed_when: false

    - name: "Cleanup: remove leftover test files"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/vm/{{ test_vm_name }}"
        - "/etc/xen/{{ test_vm_name }}.cfg"
        - "/etc/xen/auto/{{ test_vm_name }}.cfg"

    # === Test 1: Create VM with lifecycle policies ===
    - name: "Test 1: Create VM"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm, recursive=true) }}"

    - name: "Test 1: Verify domain is running"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t1_domid
      changed_when: false

    - name: "Test 1: Assert domain exists"
      ansible.builtin.assert:
        that: _t1_domid.rc == 0
        fail_msg: "Domain {{ test_vm_name }} is not running"

    - name: "Test 1: Read generated xl config"
      ansible.builtin.slurp:
        src: "/etc/xen/{{ test_vm_name }}.cfg"
      register: _t1_cfg

    - name: "Test 1: Assert lifecycle policies in config"
      ansible.builtin.assert:
        that:
          - "'on_poweroff = \"destroy\"' in _t1_cfg_content"
          - "'on_reboot = \"restart\"' in _t1_cfg_content"
          - "'on_crash = \"preserve\"' in _t1_cfg_content"
        fail_msg: "Lifecycle policies not rendered correctly in xl config"
      vars:
        _t1_cfg_content: "{{ _t1_cfg.content | b64decode }}"

    - name: "Test 1: Assert autostart symlink does NOT exist"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t1_autostart

    - name: "Test 1: Assert no autostart"
      ansible.builtin.assert:
        that: not _t1_autostart.stat.exists
        fail_msg: "Autostart symlink should not exist when autostart=false"

    - name: "Test 1: PASSED"
      ansible.builtin.debug:
        msg: "VM created with correct lifecycle policies, no autostart"

    # === Test 2: Enable autostart ===
    - name: "Test 2: Re-apply with autostart=true"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'autostart': true}), recursive=true) }}"

    - name: "Test 2: Check autostart symlink"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t2_autostart

    - name: "Test 2: Assert autostart symlink exists"
      ansible.builtin.assert:
        that:
          - _t2_autostart.stat.exists
          - _t2_autostart.stat.islnk
        fail_msg: "Autostart symlink should exist when autostart=true"

    - name: "Test 2: Assert symlink target"
      ansible.builtin.assert:
        that: _t2_autostart.stat.lnk_source == "/etc/xen/" + test_vm_name + ".cfg"
        fail_msg: "Autostart symlink points to wrong target"

    - name: "Test 2: PASSED"
      ansible.builtin.debug:
        msg: "Autostart symlink created correctly"

    # === Test 3: Idempotency — re-run should not change running VM ===
    - name: "Test 3: Get domain ID before re-apply"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t3_domid_before
      changed_when: false

    - name: "Test 3: Re-apply same config"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'autostart': true}), recursive=true) }}"

    - name: "Test 3: Get domain ID after re-apply"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t3_domid_after
      changed_when: false

    - name: "Test 3: Assert domain ID unchanged (not recreated)"
      ansible.builtin.assert:
        that: _t3_domid_before.stdout == _t3_domid_after.stdout
        fail_msg: "Domain was recreated on re-apply (not idempotent)"

    - name: "Test 3: PASSED"
      ansible.builtin.debug:
        msg: "Idempotent — domain not recreated on re-apply"

    # === Test 4: state=absent stops domain, removes autostart ===
    - name: "Test 4: Set state=absent"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'state': 'absent', 'autostart': true}), recursive=true) }}"

    - name: "Test 4: Check domain is stopped"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t4_domid
      failed_when: false
      changed_when: false

    - name: "Test 4: Assert domain is gone"
      ansible.builtin.assert:
        that: _t4_domid.rc != 0
        fail_msg: "Domain should not be running after state=absent"

    - name: "Test 4: Check autostart removed"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t4_autostart

    - name: "Test 4: Assert autostart removed"
      ansible.builtin.assert:
        that: not _t4_autostart.stat.exists
        fail_msg: "Autostart symlink should be removed on state=absent"

    - name: "Test 4: Assert disk still exists (absent keeps disk)"
      ansible.builtin.stat:
        path: "/vm/{{ test_vm_name }}/disk.qcow2"
      register: _t4_disk

    - name: "Test 4: Assert disk preserved"
      ansible.builtin.assert:
        that: _t4_disk.stat.exists
        fail_msg: "Disk should be preserved after state=absent"

    - name: "Test 4: PASSED"
      ansible.builtin.debug:
        msg: "state=absent stopped domain, removed autostart, preserved disk"

    # === Test 5: Verify disk, cloud-init ISO, and config structure ===
    - name: "Test 5: Check VM directory structure"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _t5_files
      loop:
        - "/vm/{{ test_vm_name }}/disk.qcow2"
        - "/vm/{{ test_vm_name }}/cloudinit.iso"
        - "/etc/xen/{{ test_vm_name }}.cfg"

    - name: "Test 5: Assert all files exist"
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Missing: {{ item.item }}"
      loop: "{{ _t5_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Test 5: Verify disk is a qcow2 overlay"
      ansible.builtin.command:
        cmd: "qemu-img info /vm/{{ test_vm_name }}/disk.qcow2"
      register: _t5_qemu
      changed_when: false

    - name: "Test 5: Assert backing file"
      ansible.builtin.assert:
        that: "'backing file' in _t5_qemu.stdout"
        fail_msg: "Disk is not a COW overlay"

    - name: "Test 5: PASSED"
      ansible.builtin.debug:
        msg: "Directory structure and disk overlay verified"

    # === Test 6: Full destroy (nuke VM, disk, config, autostart) ===
    - name: "Test 6: Re-create VM with autostart for destroy test"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'autostart': true}), recursive=true) }}"

    - name: "Test 6: Verify VM is running before destroy"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      changed_when: false

    - name: "Test 6: Verify autostart exists before destroy"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t6_pre_autostart

    - name: "Test 6: Assert autostart exists"
      ansible.builtin.assert:
        that: _t6_pre_autostart.stat.exists

    - name: "Test 6: Nuke — stop domain"
      ansible.builtin.command:
        cmd: "xl destroy {{ test_vm_name }}"
      failed_when: false

    - name: "Test 6: Nuke — remove autostart symlink"
      ansible.builtin.file:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
        state: absent

    - name: "Test 6: Nuke — remove Xen config"
      ansible.builtin.file:
        path: "/etc/xen/{{ test_vm_name }}.cfg"
        state: absent

    - name: "Test 6: Nuke — remove VM directory"
      ansible.builtin.file:
        path: "/vm/{{ test_vm_name }}"
        state: absent

    - name: "Test 6: Assert domain is gone"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      register: _t6_domid
      failed_when: false
      changed_when: false

    - name: "Test 6: Assert domain stopped"
      ansible.builtin.assert:
        that: _t6_domid.rc != 0
        fail_msg: "Domain should not exist after destroy"

    - name: "Test 6: Check all artefacts removed"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _t6_files
      loop:
        - "/vm/{{ test_vm_name }}"
        - "/vm/{{ test_vm_name }}/disk.qcow2"
        - "/vm/{{ test_vm_name }}/cloudinit.iso"
        - "/etc/xen/{{ test_vm_name }}.cfg"
        - "/etc/xen/auto/{{ test_vm_name }}.cfg"

    - name: "Test 6: Assert everything is gone"
      ansible.builtin.assert:
        that: not item.stat.exists
        fail_msg: "Should not exist after destroy: {{ item.item }}"
      loop: "{{ _t6_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Test 6: PASSED"
      ansible.builtin.debug:
        msg: "Full destroy — domain stopped, disk wiped, config removed, autostart removed"

    # === Test 7: Autostart toggle (true → false on running VM) ===
    - name: "Test 7: Create VM with autostart=true"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'autostart': true}), recursive=true) }}"

    - name: "Test 7: Verify autostart symlink exists"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t7_pre

    - name: "Test 7: Assert autostart on"
      ansible.builtin.assert:
        that: _t7_pre.stat.exists and _t7_pre.stat.islnk

    - name: "Test 7: Re-apply with autostart=false"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'autostart': false}), recursive=true) }}"

    - name: "Test 7: Verify autostart symlink removed"
      ansible.builtin.stat:
        path: "/etc/xen/auto/{{ test_vm_name }}.cfg"
      register: _t7_post

    - name: "Test 7: Assert autostart off"
      ansible.builtin.assert:
        that: not _t7_post.stat.exists
        fail_msg: "Autostart symlink should be removed when switching to autostart=false"

    - name: "Test 7: Verify VM still running (toggle should not stop it)"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      changed_when: false

    - name: "Test 7: PASSED"
      ansible.builtin.debug:
        msg: "Autostart toggle true→false removes symlink without stopping VM"

    # === Test 8: Config change on running VM ===
    - name: "Test 8: Read config before change"
      ansible.builtin.slurp:
        src: "/etc/xen/{{ test_vm_name }}.cfg"
      register: _t8_cfg_before

    - name: "Test 8: Re-apply with different memory and crash policy"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({'memory': 768, 'on_crash': 'destroy'}), recursive=true) }}"

    - name: "Test 8: Read config after change"
      ansible.builtin.slurp:
        src: "/etc/xen/{{ test_vm_name }}.cfg"
      register: _t8_cfg_after

    - name: "Test 8: Assert config updated on disk"
      ansible.builtin.assert:
        that:
          - "'memory = 768' in _t8_after_content"
          - "'on_crash = \"destroy\"' in _t8_after_content"
          - "'memory = 512' not in _t8_after_content"
        fail_msg: "xl config should reflect new memory and crash policy"
      vars:
        _t8_after_content: "{{ _t8_cfg_after.content | b64decode }}"

    - name: "Test 8: Assert VM still running (config change is next-boot)"
      ansible.builtin.command:
        cmd: "xl domid {{ test_vm_name }}"
      changed_when: false

    - name: "Test 8: PASSED"
      ansible.builtin.debug:
        msg: "Config change updates file on disk, does not restart running VM"

    # === Test 9: Runner cloud-init (template validation only) ===
    - name: "Test 9: Stop test VM for runner test"
      ansible.builtin.command:
        cmd: "xl destroy {{ test_vm_name }}"
      failed_when: false

    - name: "Test 9: Remove test VM disk for fresh cloud-init"
      ansible.builtin.file:
        path: "/vm/{{ test_vm_name }}"
        state: absent

    - name: "Test 9: Create VM with runner block"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(test_vm | combine({
          'runner': {
            'repo_url': 'https://github.com/test/repo',
            'token': 'FAKE_TOKEN_FOR_TESTING',
            'labels': 'self-hosted,xen,test',
            'version': '2.323.0'
          }
        }), recursive=true) }}"

    - name: "Test 9: Mount cloud-init ISO and check user-data"
      ansible.builtin.shell:
        cmd: |
          mkdir -p /tmp/xliac-test-mount
          mount -o loop /vm/{{ test_vm_name }}/cloudinit.iso /tmp/xliac-test-mount
          cat /tmp/xliac-test-mount/user-data
          umount /tmp/xliac-test-mount
          rmdir /tmp/xliac-test-mount
      register: _t9_userdata

    - name: "Test 9: Assert runner install script in user-data"
      ansible.builtin.assert:
        that:
          - "'/opt/runner-install.sh' in _t9_userdata.stdout"
          - "'RUNNER_VERSION=\"2.323.0\"' in _t9_userdata.stdout"
          - "'RUNNER_LABELS=\"self-hosted,xen,test\"' in _t9_userdata.stdout"
          - "'RUNNER_REPO=\"https://github.com/test/repo\"' in _t9_userdata.stdout"
          - "'RUNNER_TOKEN=\"FAKE_TOKEN_FOR_TESTING\"' in _t9_userdata.stdout"
          - "'RUNNER_NAME=\"{{ test_vm_name }}\"' in _t9_userdata.stdout"
        fail_msg: "Runner install script not correctly rendered in user-data"

    - name: "Test 9: Assert runner script is executable via runcmd"
      ansible.builtin.assert:
        that:
          - "'/opt/runner-install.sh' in _t9_userdata.stdout"
        fail_msg: "Runner script should be called from runcmd"

    - name: "Test 9: PASSED"
      ansible.builtin.debug:
        msg: "Runner cloud-init template renders correctly with all runner vars"

    # === Test 10: Multiple VMs ===
    - name: "Test 10: Stop and clean test VM"
      ansible.builtin.command:
        cmd: "xl destroy {{ test_vm_name }}"
      failed_when: false

    - name: "Test 10: Clean both test VMs"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/vm/{{ test_vm_name }}"
        - "/vm/{{ test_vm_name }}-2"
        - "/etc/xen/{{ test_vm_name }}.cfg"
        - "/etc/xen/{{ test_vm_name }}-2.cfg"

    - name: "Test 10: Create two VMs via role loop"
      ansible.builtin.include_role:
        name: xen_vm
      vars:
        vm: "{{ vm_defaults | combine(item, recursive=true) }}"
      loop:
        - name: "{{ test_vm_name }}"
          image: ubuntu-24.04
          memory: 512
          vcpus: 1
          disk_size: 4G
          bridge: xenbr0
          state: present
          autostart: false
          on_poweroff: destroy
          on_reboot: restart
          on_crash: restart
        - name: "{{ test_vm_name }}-2"
          image: ubuntu-24.04
          memory: 512
          vcpus: 1
          disk_size: 4G
          bridge: xenbr0
          state: present
          autostart: false
          on_poweroff: destroy
          on_reboot: restart
          on_crash: restart

    - name: "Test 10: Verify both domains running"
      ansible.builtin.command:
        cmd: "xl domid {{ item }}"
      loop:
        - "{{ test_vm_name }}"
        - "{{ test_vm_name }}-2"
      changed_when: false

    - name: "Test 10: Verify both configs exist"
      ansible.builtin.stat:
        path: "/etc/xen/{{ item }}.cfg"
      register: _t10_cfgs
      loop:
        - "{{ test_vm_name }}"
        - "{{ test_vm_name }}-2"

    - name: "Test 10: Assert both configs exist"
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Config missing: {{ item.item }}"
      loop: "{{ _t10_cfgs.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Test 10: PASSED"
      ansible.builtin.debug:
        msg: "Multiple VMs created and running simultaneously"

    # === Cleanup ===
    - name: "Cleanup: destroy all test domains"
      ansible.builtin.command:
        cmd: "xl destroy {{ item }}"
      loop:
        - "{{ test_vm_name }}"
        - "{{ test_vm_name }}-2"
      failed_when: false
      changed_when: false

    - name: "Cleanup: remove all test files"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/vm/{{ test_vm_name }}"
        - "/vm/{{ test_vm_name }}-2"
        - "/etc/xen/{{ test_vm_name }}.cfg"
        - "/etc/xen/{{ test_vm_name }}-2.cfg"
        - "/etc/xen/auto/{{ test_vm_name }}.cfg"
        - "/etc/xen/auto/{{ test_vm_name }}-2.cfg"

    - name: "ALL TESTS PASSED"
      ansible.builtin.debug:
        msg: "10/10 tests passed — lifecycle, autostart, idempotency, absent, structure, destroy, toggle, config change, runner template, multi-VM"
